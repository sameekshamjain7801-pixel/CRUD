<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserFlow | Premium CRUD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>UserFlow</h1>
            <p>Manage your users with elegance</p>
        </header>

        <section class="form-section">
            <div class="glass-card">
                <h2 id="form-title">Add New User</h2>
                <form id="user-form">
                    <input type="hidden" id="user-id">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="phno">Phone Number</label>
                        <input type="tel" id="phno" placeholder="+1 234 567 890" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn-primary">Add User</button>
                        <button type="button" id="cancel-btn" class="btn-secondary hidden">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="table-section">
            <div class="glass-card">
                <h2>Active Users</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Users will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="ai-section">
            <div class="glass-card">
                <h2>AI Insight Assistant</h2>
                <p class="ai-subtitle">Ask questions about your data</p>
                <div class="ai-container">
                    <div class="input-group">
                        <textarea id="ai-question" placeholder="Example: How many users have gmail accounts? or What are the common patterns?"></textarea>
                    </div>
                    <button id="ask-ai-btn" class="btn-primary">
                        <span id="btn-text">Ask Assistant</span>
                        <div id="ai-loader" class="loader hidden"></div>
                    </button>
                    <div id="ai-response-container" class="ai-response-container hidden">
                        <h3>Response:</h3>
                        <p id="ai-response-text"></p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
